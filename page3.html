<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UNC Club - Age Check</title>
    <link rel="icon" href="images/bow.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/script.js"></script>
  </head>
  <body data-page="age">
    <a class="skip-link" href="#main">Skip to main content</a>

    <div class="sky-layer" aria-hidden="true">
      <span>✧</span>
      <span>♡</span>
      <span>♥</span>
      <span>☆</span>
      <span>✦</span>
      <span>♡</span>
    </div>

    <button class="sound-toggle" type="button" data-sound-toggle aria-label="Toggle background music" title="music">♪</button>

    <header class="site-header">
      <a class="site-logo" href="index.html">♡ lysfm😖 </a>
      <nav class="site-nav" aria-label="Cute page map">
        <a href="index.html">01</a>
        <a href="page2.html">02</a>
        <a aria-current="page" href="page3.html">03</a>
        <a href="page4.html">04</a>
        <a href="page5.html">05</a>
        <a href="page6.html">06</a>
      </nav>
    </header>

    <main id="main" class="page-shell">
      <!-- Page 3 controls the age check. The redirect URL is in js/script.js. -->
      <section class="window-frame age-panel" aria-labelledby="age-title">
        <div class="window-title">age-check.js</div>

        <div class="sticker-row" aria-hidden="true">
          <!-- Replace this GIF with your own. -->
          <img class="decor-img replaceable-gif" src="images/gif-placeholder-heart.gif" alt="">
          <!-- Replace this image. -->
          <img class="decor-img" src="images/bow.svg" alt="">
          <!-- Replace this GIF with your own. -->
          <img class="decor-img replaceable-gif" src="images/gif-placeholder-sparkle.gif" alt="">
        </div>

        <h1 id="age-title">How old r u now?</h1>
        <form class="age-form" id="age-form">
          <label class="sr-only" for="age-input">How old ru now?</label>
          <input id="age-input" type="number" min="0" max="120" inputmode="numeric" placeholder="type age">
          <button class="gloss-button" type="submit">Check</button>
        </form>

        <p class="age-message" id="age-message" aria-live="polite"></p>

        <div class="kid-panel" id="kid-panel" hidden>
          <p>هه ... بعدك قاصر 😹😹</p>
          <button class="gloss-button" id="kid-continue" type="button">Continue</button>
        </div>
      </section>
    </main>
  </body>
</html>
