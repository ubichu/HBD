<!DOCTYPE html>
<!-- ============================================================
     FINAL PAGE — page6-birthday.html
     ============================================================
     EDIT ME: the birthday message text is in the <p class="handwritten">
     block below. It's set to right-to-left (RTL) since it's Arabic —
     if you change it to English, you can remove dir="rtl" if you want.
     ============================================================ -->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>🎂 كل عام وأنت بخير 🎂</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Page-specific tweaks just for this final birthday page */
    .cake-row { font-size: 40px; margin: 10px 0; animation: float-bounce 2s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- ============================================
       Rising balloons — purely decorative.
       EDIT ME: change the colors array in the script
       at the bottom if you want different balloon colors.
       ============================================ -->
  <div id="balloonLayer"></div>

  <div class="page-wrap">

    <div class="marquee-wrap">
      <span class="marquee-track">
        🎉 happy birthday 🎉 كل عام وأنت بخير 🎉 best day ever 🎉
      </span>
    </div>

    <div class="cake-row">🎂🎈🎉</div>

    <div class="deco-row">
      <img class="deco-img" src="images/deco1.png" alt="" onerror="this.outerHTML='<div class=\'placeholder-box\'>🐱</div>'">
      <img class="deco-img" src="images/deco2.png" alt="" onerror="this.outerHTML='<div class=\'placeholder-box\'>💖</div>'">
      <img class="deco-img" src="images/deco3.png" alt="" onerror="this.outerHTML='<div class=\'placeholder-box\'>🎀</div>'">
      <img class="deco-img" src="images/deco4.png" alt="" onerror="this.outerHTML='<div class=\'placeholder-box\'>⭐</div>'">
    </div>

    <div class="guestbook-box">
      <!-- ============================================
           EDIT ME: the birthday message itself
           ============================================ -->
      <p class="handwritten">
        كل عام وأنت بخير يا أجمل شيء بالدنيا 🎂💖<br><br>
        أحبك وأعشقك، وأتمنى لك سنة سعيدة وحياة مليئة بالفرح.<br><br>
        وكل عام وأنا محظوظ لأنك بحياتي. 🙄💖
      </p>
    </div>

    <div class="deco-row">
      <img class="deco-img" src="images/deco4.png" alt="" onerror="this.outerHTML='<div class=\'placeholder-box\'>🎈</div>'">
      <img class="deco-img" src="images/deco3.png" alt="" onerror="this.outerHTML='<div class=\'placeholder-box\'>✨</div>'">
      <img class="deco-img" src="images/deco2.png" alt="" onerror="this.outerHTML='<div class=\'placeholder-box\'>😻</div>'">
    </div>

    <div class="hit-counter">🎂 BEST DAY OF THE YEAR 🎂</div>
    <div class="webring-footer">made with 💜 on the old web</div>
  </div>

  <script src="js/main.js"></script>
  <script>
    /* ----------------------------------------------------------
       FINAL PAGE LOGIC — rising balloons
       EDIT ME: change BALLOON_COLORS to swap balloon colors
       ---------------------------------------------------------- */
    const BALLOON_COLORS = ["#ff2fb3", "#00e5ff", "#fff200", "#39ff14", "#b300ff"];
    const balloonLayer = document.getElementById("balloonLayer");

    function spawnBalloon() {
      const b = document.createElement("div");
      b.className = "balloon";
      const color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
      b.style.background = `radial-gradient(circle at 30% 30%, #fff, ${color})`;
      b.style.boxShadow = `0 0 14px ${color}`;
      b.style.left = Math.random() * 100 + "vw";
      const duration = 7 + Math.random() * 6;
      b.style.animationDuration = duration + "s";
      balloonLayer.appendChild(b);
      setTimeout(() => b.remove(), duration * 1000);
    }

    // Spawn a new balloon every second or so, forever
    setInterval(spawnBalloon, 1000);
    for (let i = 0; i < 5; i++) setTimeout(spawnBalloon, i * 300);
  </script>
</body>
</html>
