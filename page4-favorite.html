<!DOCTYPE html>
<!-- ============================================================
     PAGE 4 — page4-favorite.html
     ============================================================
     EDIT ME:
       - Button label text "ubichu" / "القيمه" — change the text
         inside the <button> tags below.
       - BUTTON_TEXT_A / BUTTON_TEXT_B style — search "EDIT ME"
     ============================================================ -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>♡ UNC CLUB ♡ Choose Wisely</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="page-wrap">

    <div class="marquee-wrap">
      <span class="marquee-track">
        ✦ THIS IS A TEST OF TRUE LOVE ✦ CHOOSE CAREFULLY ✦
      </span>
    </div>

    <div class="guestbook-box">
      <p class="chrome-title">What is ur favorite<br>thing in the world 🤔</p>
      <p style="color:#d9b3ff; font-size:14px; margin-top:-6px;">choose wisely 👀✨</p>

      <div style="position:relative; min-height:140px; width:100%; margin-top:20px;">
        <!-- The "correct" button — stays put, always clickable -->
        <button class="glossy-btn green" id="ubichuBtn">ubichu</button>

        <!-- The runaway button — jumps to a random spot every time
             the visitor's pointer gets near it / tries to click it -->
        <button class="glossy-btn btn-runaway" id="runawayBtn" style="top:120px; left:calc(50% - 60px);">القيمه</button>
      </div>
    </div>

    <p class="small-note">psst... one of these buttons doesn't want to be pressed 😼</p>

    <div class="hit-counter">CHOOSE TO PROCEED</div>
  </div>

  <script src="js/main.js"></script>
  <script>
    /* ----------------------------------------------------------
       PAGE 4 LOGIC
       - "runawayBtn" teleports to a new random position the
         moment a pointer gets close to it (and also on direct
         click/touch attempts, as a safety net on slower devices).
       - "ubichuBtn" is the only way forward.
       ---------------------------------------------------------- */
    const runawayBtn = document.getElementById("runawayBtn");
    const ubichuBtn = document.getElementById("ubichuBtn");

    const BTN_W = 110; // approx width/height in px, used to keep button on-screen
    const BTN_H = 56;

    function moveRunawayButton() {
      const maxX = window.innerWidth - BTN_W - 10;
      const maxY = window.innerHeight - BTN_H - 10;
      const newX = Math.max(10, Math.random() * maxX);
      const newY = Math.max(80, Math.random() * maxY); // keep below the top banner
      runawayBtn.style.left = newX + "px";
      runawayBtn.style.top = newY + "px";
    }

    // Jump away as soon as a click/tap is attempted directly on it
    runawayBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveRunawayButton();
    });

    // Also jump away when a mouse cursor merely hovers near it (desktop)
    runawayBtn.addEventListener("pointerenter", () => {
      moveRunawayButton();
    });

    // On touchscreens, jump away as soon as a finger touches near it
    runawayBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveRunawayButton();
    }, { passive: false });

    // Give it an initial random position once the page loads
    window.addEventListener("load", moveRunawayButton);
    window.addEventListener("resize", moveRunawayButton);

    // The real way forward
    ubichuBtn.addEventListener("click", () => {
      // EDIT ME: change this filename if you rename page 5
      window.location.href = "page5-aww.html";
    });
  </script>
</body>
</html>
