<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UNC Club - Reaction</title>
    <link rel="icon" href="images/bow.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/script.js"></script>
  </head>
  <body data-page="reaction">
    <a class="skip-link" href="#main">Skip to main content</a>

    <div class="sky-layer" aria-hidden="true">
      <span>♡</span>
      <span>♥</span>
      <span>✧</span>
      <span>☆</span>
      <span>✦</span>
      <span>♡</span>
    </div>

    <button class="sound-toggle" type="button" data-sound-toggle aria-label="Toggle background music" title="music">♪</button>

    <header class="site-header">
      <a class="site-logo" href="index.html">♡ lysfm😖 </a>
      <nav class="site-nav" aria-label="Cute page map">
        <a href="index.html">01</a>
        <a href="page2.html">02</a>
        <a href="page3.html">03</a>
        <a href="page4.html">04</a>
        <a aria-current="page" href="page5.html">05</a>
        <a href="page6.html">06</a>
      </nav>
    </header>

    <main id="main" class="page-shell">
      <!-- Page 5 controls the reaction message after the right choice. -->
      <section class="window-frame reaction-panel" aria-labelledby="reaction-title">
        <div class="window-title">reaction.gif</div>

        <div class="sticker-row" aria-hidden="true">
          <!-- Replace this GIF with your own reaction GIF. -->
          <img class="decor-img replaceable-gif" src="images/gif-placeholder-heart.gif" alt="">
          <!-- Replace this image. -->
          <img class="decor-img" src="images/teddy.svg" alt="">
          <!-- Replace this GIF with your own sparkle GIF. -->
          <img class="decor-img replaceable-gif" src="images/gif-placeholder-sparkle.gif" alt="">
        </div>

        <h1 id="reaction-title">Ooooh, I can't believe U actually chose me. 🤏🏻🥹</h1>
        <p class="reaction-copy">i would chose U too btw🙄👉🏻👈🏻</p>

        <button class="gloss-button" id="reaction-continue" type="button">Continue</button>
      </section>
    </main>
  </body>
</html>
